<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">


    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Cartita</title>

    <link href="https://fonts.googleapis.com/css2?family=UnifrakturCook:wght@700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel&display=swap" rel="stylesheet">

    <style>
    body {
        background: radial-gradient(circle, #690000, #1a0000);        
        height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
        margin: 0;
        font-family: Arial;
        color: white;
    }


    .corazones {
        position: absolute;
        width: 100%;
        height: 100%;
        top: 0;
        left: 0;
        overflow: hidden;
        pointer-events: none;
    }

    .corazones span {
        position: absolute;
        font-size: 20px;
        animation: flotar 6s linear infinite;
        opacity: 0.7;
        filter: brightness(0.3);
    }

    .corazones span:nth-child(1) { left: 10%; animation-duration: 5s; }
    .corazones span:nth-child(2) { left: 30%; animation-duration: 7s; }
    .corazones span:nth-child(3) { left: 50%; animation-duration: 6s; }
    .corazones span:nth-child(4) { left: 70%; animation-duration: 8s; }
    .corazones span:nth-child(5) { left: 90%; animation-duration: 5s; }
    .corazones span:nth-child(6) { left: 10%; animation-duration: 4s; }
    .corazones span:nth-child(7) { left: 30%; animation-duration: 7s; }
    .corazones span:nth-child(8) { left: 50%; animation-duration: 5s; }
    .corazones span:nth-child(9) { left: 70%; animation-duration: 4s; }
    .corazones span:nth-child(10) { left: 90%; animation-duration: 4s; }

    @keyframes flotar {
        0% { top: 100%; opacity: 0; }
        50% { opacity: 0.7; }
        100% { top: -10%; opacity: 0; }
    }

    @keyframes latido {
    0%   { transform: scale(1); }
    25%  { transform: scale(1.05); }
    40%  { transform: scale(1); }
    60%  { transform: scale(1.05); }
    100% { transform: scale(1); }
    }

    .caja {
        position: relative;
        z-index: 2;
        background: rgb(75, 10, 10);
        padding: 30px;
        border-radius: 20px;
        text-align: center;
        box-shadow: 0 10px 25px rgba(3, 3, 3, 0.2);
        max-width: 90%;
        max-height: 80vh;
        overflow-y: auto;
        
    }

    button {
        margin-top: 15px;
        padding: 10px 20px;
        border: none;
        border-radius: 10px;
        background: #29050b;
        color: white;
        cursor: pointer;
        font-family: 'UnifrakturCook', cursive;
    }

    h1 {
        font-family: 'UnifrakturCook', cursive;
        font-size: 24px;

    
        text-shadow: 
        0 0 5px #ff1a1a,
        0 0 10px #990000,
        0 0 20px #660000;

        animation: latido 2s infinite;
        font-family: 'UnifrakturCook', cursive;
        font-size: 24px;
    }

    p {
        font-family: 'Cinzel', serif;
        line-height: 1.7;
        letter-spacing: 1.2px;
        word-wrap: break-word;
    }

    .inicio {
        font-family: 'UnifrakturCook', cursive;
    }
    #corazon {
    font-size: 40px;
    margin-top: 15px;
    display: none; 
    }

    .latir {
    animation: latidoCorazon 1s infinite;
    }

    @keyframes latidoCorazon {
    0%   { transform: scale(1); }
    25%  { transform: scale(1.3); }
    50%  { transform: scale(1); }
    75%  { transform: scale(1.3); }
    100% { transform: scale(1); }
    }

    .niebla {
    position: absolute;
    width: 200%;
    height: 200%;
    background: radial-gradient(circle, rgba(0,0,0,0.2), transparent 70%);
    animation: moverNiebla 20s linear infinite;
    top: -50%;
    left: -50%;
    pointer-events: none;
    }

    @keyframes moverNiebla {
    0% { transform: translate(0,0); }
    50% { transform: translate(50px, 30px); }
    100% { transform: translate(0,0); }
    }

    .caja::-webkit-scrollbar {
    display: none;
    }

    .caja {
    -ms-overflow-style: none;
    scrollbar-width: none;
    }
    </style>
</head>

<body>

    <div class="corazones">
        <span>🖤</span>
        <span>🖤</span>
        <span>🖤</span>
        <span>🖤</span>
        <span>🖤</span>
        <span>🖤</span>
        <span>🖤</span>
        <span>🖤</span>
        <span>🖤</span>
        <span>🖤</span>
    </div>

    <div class="caja">
        <h1>Lucecita bonita⁠♡</h1>
        <p id="mensaje" class="inicio">Abre la siguiente cartita</p>
        <button onclick="abrirCartita()">Ábreme</button>
        <div id="corazon">🖤</div>
        <div class="niebla"></div>
        <audio id="musica" src="cancion.mp3"></audio>
    </div>

<script>
function abrirCartita(){
    let texto = `
    Mientras estaba haciendo mi curso me dieron ganas de hacerte algo a ti pues así puedo recordar,
    aprender y practicar mientras le hago algo a alguien que me gusta y es muy especial. No se porque no se me habia ocurrido 
    antes hacer algo así y la verdad es bonito, emocionante y divertido hacer esto jaja, quiero decirte que 
    eres muy importante para mí y cualquier cosa que sientas siempre lo va a ser para mí, eres alguien increible y como 
    me dijiste apenas es normal que nos lleguemos a sentir así. No está mal sentir pero no debes reprimirte y guardar
    esas emociones y pensamientos, se que tu puedes hacer todo lo que 
    te propongas porque eres increíble, brillante como tu nombre lo dice. Debes felicitarte a ti misma por todo lo que 
    haces, hasta mi mamá siempre lo dice con un tono de admiración, dice que se sorprende por las cosas que haces pues 
    si pudieras verte desde mis ojos o incluso los de mi mamá se que te darías cuenta y como se que no podemos vernos desde nuestros
    propios ojos es por eso que te lo digo, porque es así. 
    Eres muy importante para mí y no quiero que estés solita porque yo estoy aquí y estar aquí es algo que hago con mucho amor 
    y cariño Lucecita bonita.⁠♡
    `;
    let i = 0;
    let velocidad = 80;
    document.getElementById("mensaje").innerHTML = "";

        function escribir(){
        if(i < texto.length){
            document.getElementById("mensaje").innerHTML += texto.charAt(i);
            i++;
            setTimeout(escribir, velocidad);
        }
    }

    escribir();

    let corazon = document.getElementById("corazon");
    corazon.style.display = "block";
    corazon.classList.add("latir");

    let musica = document.getElementById("musica");
    musica.play();
}
</script>

</body>
</html>
